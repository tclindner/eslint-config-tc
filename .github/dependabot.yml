version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  groups:
    eslint-dependencies:
      patterns:
        - "eslint"
        - "eslint-plugin-*"
        - "@eslint/*"
        - "eslint-config-*"
    jest-dependencies:
      patterns:
        - "jest"
        - "@jest/*"
    npm-package-json-lint-dependencies:
      patterns:
        - "npm-package-json-lint"
        - "npm-package-json-lint-config-*"
  open-pull-requests-limit: 10
  assignees:
  - tclindner
  labels:
  - 'dependencies :package:'
  versioning-strategy: increase
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
